steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - ${_IMAGE}
      - -f
      - deploy/frontend.Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_BASE_URL=${_API_URL}
      - --build-arg
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${_GCID}
      - .
images: ['${_IMAGE}']
options:
  machineType: 'E2_HIGHCPU_8'
timeout: '1200s'
