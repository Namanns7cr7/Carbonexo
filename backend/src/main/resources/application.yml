# ============================================================================
# EcoTrack backend configuration — GOOGLE CLOUD ONLY.
# Every value is overridable via environment variable (${VAR:default}).
# Secrets MUST come from env / Google Secret Manager — never commit real secrets.
# Runtime-editable business values (factors, credit rules, provider selection)
# live in the app_config DB table, not here.
# ============================================================================
spring:
  application:
    name: ecotrack-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecotrack}
    username: ${DB_USER:ecotrack}
    password: ${DB_PASSWORD:ecotrack}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}   # schema owned by Flyway; Hibernate neither mutates nor validates types
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false
  flyway:
    enabled: true
    # single source of truth = database/migrations at repo root
    locations: ${FLYWAY_LOCATIONS:filesystem:../database/migrations}
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:12MB}

server:
  # Cloud Run injects PORT; fall back to SERVER_PORT then 8080 for local runs
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: never
    include-stacktrace: never

# ---- application-specific (defaults; many also mirrored in app_config table) ----
ecotrack:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3002}
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-dev-only-secret-change-me-dev-only-secret}   # >= 256 bits in prod
      access-token-ttl-seconds: ${JWT_ACCESS_TTL:900}        # 15 min
      refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:1209600}  # 14 days
      issuer: ${JWT_ISSUER:ecotrack}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}   # OAuth Web client ID; enables "Sign in with Google"
  storage:
    provider: ${STORAGE_PROVIDER:local_stub}       # gcs | local_stub
    gcs:
      project-id: ${GCP_PROJECT_ID:}
      bucket: ${GCS_BUCKET:carbonexo-bills}
    local-stub-dir: ${STORAGE_LOCAL_DIR:./.local-blob}   # dev-only fallback
  upload:
    max-bytes: ${UPLOAD_MAX_BYTES:10485760}
    allowed-content-types: application/pdf,image/png,image/jpeg
  ocr:
    provider: ${OCR_PROVIDER:tesseract}            # google | tesseract
    google:
      project-id: ${GCP_PROJECT_ID:}
    tesseract:
      data-path: ${TESSDATA_PREFIX:}
  carbon:
    electricity-factor-default: ${CARBON_ELECTRICITY_FACTOR:0.45}  # kg CO2 / kWh fallback
  ai:
    provider: ${AI_PROVIDER:gemini}                # gemini | canned
    default-model: ${AI_DEFAULT_MODEL:gemini-2.5-pro}
    fast-model: ${AI_FAST_MODEL:gemini-2.0-flash}
    timeout-seconds: ${AI_TIMEOUT:30}
    fallback-to-canned: ${AI_FALLBACK:true}
    gemini:
      project-id: ${GCP_PROJECT_ID:}
      location: ${GCP_LOCATION:us-central1}

# ---- observability (Phase 12) ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ecotrack-backend

# ---- OpenAPI / Swagger ----
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.ecotrack: ${LOG_LEVEL_APP:DEBUG}
